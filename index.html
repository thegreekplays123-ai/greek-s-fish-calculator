<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Greek's Fish Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>🎣 The Greek's Fish Calculator</h1>

    <label>Fish Rarity (1 in X):</label>
    <input type="number" id="rarity" placeholder="e.g. 1000">

    <label>Luck (%):</label>
    <input type="number" id="luck" placeholder="e.g. 25">

    <label>Boosted Fish Chance (%):</label>
    <input type="number" id="boostedFish" placeholder="e.g. 400">

    <label>Seconds to catch 1 fish:</label>
    <input type="number" id="seconds" placeholder="e.g. 10">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
